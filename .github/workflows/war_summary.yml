name: War Summary

on:
  workflow_dispatch:  # triggered by cron-job.org at 07:00 and 19:00 UTC

concurrency:
  group: war-summary-bot
  cancel-in-progress: false    # never cancel a running summary mid-post

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  post-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout PublicNews (state files)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Clone private bot repo
        run: |
          git clone https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/alona-zubenko/telegram-war-news-bot.git bot

      - name: Install dependencies
        run: pip install -r bot/requirements.txt

      - name: Copy state files into bot directory
        run: |
          [ -f war_articles.json ] && cp war_articles.json bot/war_articles.json || echo "[]" > bot/war_articles.json

      - name: Run summary bot
        working-directory: bot
        env:
          BOT_TOKEN:               ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID:              ${{ secrets.CHANNEL_ID }}
          EXPRESS_CHANNEL_ID:      ${{ secrets.EXPRESS_CHANNEL_ID }}
          EXPRESS_CHANNEL_USERNAME: ${{ secrets.EXPRESS_CHANNEL_USERNAME }}
          CHANNEL_USERNAME:        ${{ secrets.CHANNEL_USERNAME }}
          GROQ_API_KEY:            ${{ secrets.GROQ_API_KEY }}
        run: python summary_bot.py

      - name: Copy updated war_articles.json back
        if: always()
        run: |
          cp bot/war_articles.json war_articles.json

      - name: Commit war_articles.json
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add war_articles.json
          git diff --staged --quiet || git commit -m "chore: reset war_articles.json [skip ci]"
          git pull --rebase -X theirs origin main
          git push
