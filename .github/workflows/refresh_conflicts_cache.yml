name: Refresh Conflicts Cache

on:
  workflow_dispatch:  # manual run from GitHub Actions UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  refresh-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout PublicNews (state files)
        uses: actions/checkout@v4

      - name: Clear conflicts cache in posted.json
        run: |
          python3 - <<'EOF'
          import json, os

          path = "posted.json"
          if not os.path.exists(path):
              print("posted.json not found — nothing to clear")
              exit(0)

          with open(path, "r", encoding="utf-8") as f:
              state = json.load(f)

          keys = ["conflicts_date", "conflicts", "tactical", "conflicts_uk", "tactical_uk"]
          removed = [k for k in keys if k in state]
          for k in removed:
              del state[k]

          with open(path, "w", encoding="utf-8") as f:
              json.dump(state, f, ensure_ascii=False, indent=2)

          print(f"Cleared keys: {removed}")
          EOF

      - name: Commit updated posted.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted.json
          git diff --staged --quiet || git commit -m "chore: clear conflicts cache [skip ci]"
          git pull --rebase -X theirs origin main
          git push
