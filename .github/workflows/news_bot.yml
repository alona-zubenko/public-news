name: War News Bot

on:
  workflow_dispatch:  # triggered by cron-job.org every 15 minutes

concurrency:
  group: war-news-bot
  cancel-in-progress: false    # never cancel a running bot mid-post

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  post-news:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout PublicNews (state files)
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Clone private bot repo
        run: |
          git clone https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/alona-zubenko/telegram-war-news-bot.git bot

      - name: Install dependencies
        run: pip install -r bot/requirements.txt

      - name: Copy state files into bot directory
        run: |
          [ -f posted.json ]       && cp posted.json       bot/posted.json       || echo "{}" > bot/posted.json
          [ -f war_articles.json ] && cp war_articles.json bot/war_articles.json || echo "[]" > bot/war_articles.json

      - name: Run bot
        working-directory: bot
        env:
          BOT_TOKEN:               ${{ secrets.BOT_TOKEN }}
          CHANNEL_ID:              ${{ secrets.CHANNEL_ID }}
          NEWSAPI_KEY:             ${{ secrets.NEWSAPI_KEY }}
          GROQ_API_KEY:            ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2:          ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3:          ${{ secrets.GROQ_API_KEY_3 }}
          CHANNEL_USERNAME:        ${{ secrets.CHANNEL_USERNAME }}
          EXPRESS_CHANNEL_ID:      ${{ secrets.EXPRESS_CHANNEL_ID }}
          EXPRESS_CHANNEL_USERNAME: ${{ secrets.EXPRESS_CHANNEL_USERNAME }}
        run: python news_bot.py

      - name: Copy updated state files back
        if: always()
        run: |
          [ -f bot/posted.json ]       && cp bot/posted.json       posted.json       || echo "{}" > posted.json
          [ -f bot/war_articles.json ] && cp bot/war_articles.json war_articles.json || echo "[]" > war_articles.json

      - name: Commit state files
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted.json war_articles.json
          git diff --staged --quiet || git commit -m "chore: update state files [skip ci]"
          git pull --rebase -X theirs origin main
          git push
